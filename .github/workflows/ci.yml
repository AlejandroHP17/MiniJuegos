name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify GH_PACKAGES_TOKEN
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          if [ -z "$GH_PACKAGES_TOKEN" ]; then
            echo "::error::Falta el secret GH_PACKAGES_TOKEN. Crea un PAT (classic) con read:packages y configúralo en Settings → Secrets → Actions."
            exit 1
          fi
          echo "GH_PACKAGES_TOKEN presente (${#GH_PACKAGES_TOKEN} chars)."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: ./gradlew :app:assembleDebug --no-daemon --refresh-dependencies
